services:

  postgres:
    image: debezium/postgres:13
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: weather
    command: postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d weather"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      bash -c "
      mc alias set local http://minio:9000 admin admin12345 &&
      mc mb local/datalake --ignore-existing &&
      echo 'Bucket datalake created'
      "

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin
      CLICKHOUSE_DB: lakehouse
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init_clickhouse.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G

  zookeeper:
    image: confluentinc/cp-zookeeper:5.5.3
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      KAFKA_HEAP_OPTS: -Xmx512M -Xms256M
    healthcheck:
      test: ["CMD-SHELL", "echo stat | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka:
    image: confluentinc/cp-enterprise-kafka:5.5.3
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9991
      KAFKA_HEAP_OPTS: -Xmx768M -Xms512M
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:5.5.3
    container_name: schema-registry
    depends_on:
      - zookeeper
      - kafka
    ports:
      - "8082:8082"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_CONNECTION_URL: zookeeper:2181
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://schema-registry:8081
      KAFKA_HEAP_OPTS: -Xmx256M -Xms256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  debezium:
    image: debezium/connect:1.4
    container_name: debezium
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      HEAP_OPTS: -Xmx512M -Xms256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  spark-master:
    image: huynz-spark:3.5.1
    container_name: spark-master
    build: ./spark
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8090:8080"
    volumes:
      - ./spark_jobs:/spark_jobs
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  spark-worker:
    image: huynz-spark:3.5.1
    container_name: spark-worker
    build: ./spark
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_WORKER_CORES: 4      #Change these values based on your machine's resources, mine is limited
      SPARK_WORKER_MEMORY: 4G    
      SPARK_EXECUTOR_MEMORY: 1G
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    volumes:
      - ./spark_jobs:/spark_jobs
      - ./data:/data
    deploy:
      resources:
        limits:
          memory: 4G     

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  doris-fe:
    image: apache/doris:fe-2.1.8.1
    container_name: doris-fe
    hostname: doris-fe
    ports:
      - "8030:8030"
      - "9030:9030"
    environment:
      JAVA_OPTS: -Xmx4g -Xms4g -Daws.accessKeyId=admin -Daws.secretKey=admin12345
      FE_SERVERS: "fe1:172.19.0.10:9010"
      FE_ID: 1
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: datalake
    networks:
      default:
        ipv4_address: 172.19.0.10
    volumes:
      - doris-fe-meta:/opt/apache-doris/fe/doris-meta
      - doris-fe-storage:/opt/apache-doris/fe/storage
      - ./dummy_aws_credentials:/root/.aws/credentials:ro
    command:
      - /bin/bash
      - -c
      - |
        # 1. Start the Frontend daemon
        /opt/apache-doris/fe/bin/start_fe.sh --daemon
        
        # 2. Wait for MySQL interface to open
        echo "Waiting for Doris FE MySQL interface to open..."
        while ! mysql -h 127.0.0.1 -P 9030 -u root -e "SELECT 1" >/dev/null 2>&1; do
          sleep 3
        done

        # 3. Wait for Master election
        echo "Port is open! Waiting for FE to elect a Master node..."
        while ! mysql -h 127.0.0.1 -P 9030 -u root -e "SHOW FRONTENDS;" 2>/dev/null | grep -q "true"; do
          sleep 3
        done
        
        echo "Master elected! Setting up Doris..."
        
        # Command 1: Try to add backend, but don't crash if it already exists
        mysql -h 127.0.0.1 -P 9030 -u root -e "ALTER SYSTEM ADD BACKEND '172.19.0.17:9050';" || true
        
        # Command 2: Create the catalog
        mysql -h 127.0.0.1 -P 9030 -u root -e "
        CREATE CATALOG IF NOT EXISTS iceberg_hadoop PROPERTIES (
          'type' = 'iceberg',
          'iceberg.catalog.type' = 'hadoop',
          'warehouse' = 's3a://datalake/warehouse/',
          's3.endpoint' = 'http://minio:9000',
          's3.access_key' = 'admin',
          's3.secret_key' = 'admin12345',
          's3.region' = 'us-east-1',
          'use_path_style' = 'true',
          'core.site.fs.s3a.endpoint' = 'http://minio:9000',
          'core.site.fs.s3a.access.key' = 'admin',
          'core.site.fs.s3a.secret.key' = 'admin12345',
          'core.site.fs.s3a.path.style.access' = 'true',
          'core.site.fs.s3a.impl' = 'org.apache.hadoop.fs.s3a.S3AFileSystem',
          'core.site.fs.s3a.connection.ssl.enabled' = 'false',
          'core.site.fs.s3a.signature.version' = 'S3V4'
        );"
        
        echo "Catalog configuration applied successfully. Tailing FE logs..."
        tail -f /opt/apache-doris/fe/log/fe.out
    # -----------------------------
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/api/bootstrap"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 6G

  doris-be:
    image: apache/doris:be-2.1.8.1
    container_name: doris-be
    hostname: doris-be
    ports:
      - "9010:9010"
      - "8040:8040"
      - "8060:8060"
      - "9050:9050"
    environment:
      FE_SERVERS: "fe1:172.19.0.10:9010"
      BE_ADDR: 172.19.0.17:9050
      BE_CONF_mem_limit: 2G
    networks:
      default:
        ipv4_address: 172.19.0.17
    volumes:
      - doris-be-storage:/opt/apache-doris/be/storage
      - ./dummy_aws_credentials:/root/.aws/credentials:ro
    depends_on:
      doris-fe:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M

  taxi-simulator:
    image: python:3.11-slim
    container_name: taxi-simulator
    command: bash -c "pip install psycopg2-binary -q && python -u /spark_jobs/taxi_simulator.py"
    volumes:
      - ./spark_jobs:/spark_jobs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  weather-simulator:
    image: python:3.11-slim
    container_name: weather-simulator
    command: >
      bash -c "pip install -q psycopg2-binary requests && python -u /spark_jobs/weather_simulator.py"
    volumes:
      - ./spark_jobs:/spark_jobs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  analytics-api:
    build:
      context: ./serving
      dockerfile: Dockerfile
    container_name: analytics-api
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8001:8000" 
    environment:
      ENVIRONMENT: production
      API_KEY: huynz-super-secret-key-2026
      DORIS_HOST: doris-fe
      DORIS_PORT: 9030
      DORIS_USER: root
      DORIS_PASSWORD: ""
      CH_HOST: clickhouse
      CH_PORT: 8123
      CH_USER: admin
      CH_PASSWORD: admin
      CH_DB: lakehouse
      CH_POOL_SIZE: 20
      CH_MAX_OVERFLOW: 10
      CH_POOL_TIMEOUT: 30
      CH_POOL_RECYCLE: 3600
      CH_POOL_PRE_PING: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: weather
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      PG_POOL_MIN: 2
      PG_POOL_MAX: 20
    command: >
      python -m uvicorn api:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --timeout-keep-alive 30
    volumes:
      - ./serving:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  analytics-dashboard:
    build: 
      context: ./serving
      dockerfile: Dockerfile
    container_name: analytics-dashboard
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      analytics-api:
        condition: service_healthy
    ports:
      - "8505:8501" 
    environment:
      API_BASE_URL: http://analytics-api:8000/api/v1 
      API_KEY: huynz-super-secret-key-2026
    volumes:
      - ./serving:/app
    restart: unless-stopped

  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    depends_on:
      - postgres
      - clickhouse
    # the port mapped but nothing will answer on 8081 since I intentionally turned the Web UI off for faster startup
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "
      pip install -r /requirements.txt &&
      airflow db migrate &&
      airflow scheduler
      "

volumes:
  clickhouse_data:
  postgres_data:
  minio_data:
  doris-fe-meta:
  doris-fe-storage:
  doris-be-storage:

networks:
  default:
    name: huynz_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16